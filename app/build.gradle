plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.aarishkhan.aarishai'
    compileSdk 35

    defaultConfig {
        applicationId "com.aarishkhan.aarishai"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'com.google.mlkit:text-recognition:16.0.1' // AARISH_OCR_TEXT_CLICK_V4
    implementation 'com.google.mlkit:text-recognition-devanagari:16.0.1' // AARISH_OCR_LATIN_DEVANAGARI_V29

    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}

