workflows:
  android-build:
    name: AarishAI Android Build
    environment:
      java: 17
    scripts:
      - name: Build Debug APK
        script: |
          set -euo pipefail
          echo "AarishAI Codemagic build start"
          java -version || true

          export GRADLE_OPTS="${GRADLE_OPTS:-} -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.wrapper.networkTimeout=120000"
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/share/android-sdk}"
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"

          echo "Remote source sanity check:"
          python3 - <<'PY'
          from pathlib import Path
          import sys

          def fail(msg):
              print(msg)
              sys.exit(1)

          fcs = Path("app/src/main/java/com/aarishkhan/aarishai/FloatingControlService.kt").read_text(encoding="utf-8", errors="replace")
          manifest = Path("app/src/main/AndroidManifest.xml").read_text(encoding="utf-8", errors="replace")
          gradle = Path("app/build.gradle").read_text(encoding="utf-8", errors="replace")

          if "android.widget.ScrollView.LayoutParams" in fcs:
              fail("FAIL: ScrollView.LayoutParams still present")
          if "addView(textView, -1, -2)" not in fcs:
              fail("FAIL: safe workflow text addView missing")
          if "AARISH_WORKFLOW_CHAIN_BOUNDED_SCROLL_V1" not in fcs:
              fail("FAIL: workflow bounded scroll marker missing")
          if "showBuildMasterWorkflowDialog" not in fcs or "showSelectNextConfigForWorkflowDialog" not in fcs:
              fail("FAIL: Build/Master Chain functions missing")
          if "MemoryClipboardCaptureActivity" not in manifest:
              fail("FAIL: MemoryClipboardCaptureActivity not registered")
          if "@style/AarishTheme.GhostClipboard" not in manifest:
              fail("FAIL: Ghost clipboard theme not registered")
          if "text-recognition-devanagari" not in gradle:
              fail("FAIL: Devanagari OCR dependency missing")

          idx = fcs.find("fun aarishWrapWorkflowDialogViewV1")
          if idx < 0:
              fail("FAIL: workflow wrapper helper missing")
          brace = fcs.find("{", idx)
          depth = 0
          end = -1
          for i in range(brace, len(fcs)):
              if fcs[i] == "{":
                  depth += 1
              elif fcs[i] == "}":
                  depth -= 1
                  if depth == 0:
                      end = i + 1
                      break
          block = fcs[idx:end]
          print(block[:900])
          for bad in ["LayoutParams", "layoutParams", "FrameLayout", "addView(content", "params.width", "params.height"]:
              if bad in block:
                  fail("FAIL: workflow helper risky token: " + bad)
          if "return content" not in block:
              fail("FAIL: workflow helper return content missing")
          PY

          echo "Gradle check:"
          if command -v gradle >/dev/null 2>&1; then
            gradle --version
            echo "Using Codemagic system Gradle"
            gradle --no-daemon --stacktrace :app:assembleDebug
          elif [ -x ./gradlew ]; then
            ./gradlew --no-daemon --stacktrace :app:assembleDebug
          else
            echo "FAIL: neither system gradle nor gradlew found"
            exit 1
          fi
    artifacts:
      - app/build/outputs/apk/**/*.apk
