workflows:
  android-build:
    name: AarishAI Android Build
    environment:
      java: 17
    scripts:
      - name: Build Debug APK
        script: |
          set -e
          if [ ! -f ./gradlew ]; then
            echo "gradlew missing; generating Gradle wrapper..."
            gradle wrapper --gradle-version 8.0.2
          fi
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/**/*.apk
